<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="theme-color" content="#0A0907"/>
  <title>The Warded House</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; width: 100%;
      background: #0A0907;
      font-family: 'Plus Jakarta Sans', sans-serif;
      color: #EDE3CF;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    .wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeIn 0.5s ease forwards;
    }
    .emblem {
      width: 72px; height: 72px;
      border-radius: 20px;
      background: linear-gradient(145deg, #1E1B12, #141009);
      border: 1px solid rgba(212,146,74,0.18);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 22px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.04);
    }
    .name {
      font-family: 'Playfair Display', serif;
      font-size: 26px; font-weight: 600;
      color: #EDE3CF; letter-spacing: -0.01em;
      margin-bottom: 6px; text-align: center;
    }
    .tagline {
      font-size: 13px; font-weight: 500;
      color: #957E68; letter-spacing: 0.12em;
      text-transform: uppercase; margin-bottom: 40px; text-align: center;
    }
    .loader { display: flex; gap: 7px; align-items: center; }
    .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #D4924A;
      animation: pulse 1.4s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; background: rgba(212,146,74,0.6); }
    .dot:nth-child(3) { animation-delay: 0.4s; background: rgba(212,146,74,0.35); }
    @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse { 0%,100% { opacity:0.3; transform:scale(0.8); } 50% { opacity:1; transform:scale(1); } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="emblem">
      <svg viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg" width="38" height="38">
        <path d="M19 4L33 11V22C33 28.627 26.732 33.8 19 35C11.268 33.8 5 28.627 5 22V11L19 4Z"
              stroke="#D4924A" stroke-width="1.5" stroke-linejoin="round" fill="rgba(212,146,74,0.08)"/>
        <path d="M14 19L17.5 22.5L24 15" stroke="#D4924A" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="name">The Warded House</div>
    <div class="tagline">Household Management</div>
    <div class="loader">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
  <script>
    // ── UPDATE THIS URL WHEN THE CLAUDE ARTIFACT CHANGES ──
    const APP_URL = "https://claude.ai/public/artifacts/105ab945-724a-4678-8c07-a6bffdd43d28";
    // ─────────────────────────────────────────────────────
    setTimeout(() => { window.location.replace(APP_URL); }, 700);
  </script>
</body>
</html>
