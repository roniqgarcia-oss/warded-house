<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="theme-color" content="#0A0907"/>
  <title>The Warded House</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; width: 100%;
      background: #0A0907;
      font-family: 'Plus Jakarta Sans', sans-serif;
      color: #EDE3CF;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    .wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      animation: fadeIn 0.6s ease forwards;
    }

    .emblem {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      background: linear-gradient(145deg, #1E1B12, #141009);
      border: 1px solid rgba(212,146,74,0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 22px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.04);
    }
    .emblem svg { width: 38px; height: 38px; }

    .name {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      font-weight: 600;
      color: #EDE3CF;
      letter-spacing: -0.01em;
      margin-bottom: 6px;
      text-align: center;
    }
    .tagline {
      font-size: 13px;
      font-weight: 500;
      color: #957E68;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 40px;
      text-align: center;
    }

    .loader {
      display: flex;
      gap: 7px;
      align-items: center;
      height: 20px;
    }
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #D4924A;
      animation: pulse 1.4s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; background: rgba(212,146,74,0.6); }
    .dot:nth-child(3) { animation-delay: 0.4s; background: rgba(212,146,74,0.35); }

    .status {
      margin-top: 20px;
      font-size: 12px;
      font-weight: 500;
      color: #5A4E3A;
      letter-spacing: 0.04em;
      min-height: 18px;
      text-align: center;
    }

    .error-box {
      display: none;
      margin-top: 32px;
      background: rgba(201,112,96,0.08);
      border: 1px solid rgba(201,112,96,0.2);
      border-radius: 12px;
      padding: 16px 20px;
      max-width: 320px;
      text-align: center;
    }
    .error-box p {
      font-size: 13px;
      color: #C97060;
      font-weight: 500;
      line-height: 1.6;
      margin-bottom: 12px;
    }
    .error-box a {
      display: inline-block;
      background: rgba(201,112,96,0.12);
      border: 1px solid rgba(201,112,96,0.25);
      color: #C97060;
      font-size: 12px;
      font-weight: 600;
      padding: 8px 18px;
      border-radius: 8px;
      text-decoration: none;
      letter-spacing: 0.04em;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50%       { opacity: 1;   transform: scale(1); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="emblem">
      <!-- Ward symbol -->
      <svg viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M19 4L33 11V22C33 28.627 26.732 33.8 19 35C11.268 33.8 5 28.627 5 22V11L19 4Z"
              stroke="#D4924A" stroke-width="1.5" stroke-linejoin="round" fill="rgba(212,146,74,0.08)"/>
        <path d="M14 19L17.5 22.5L24 15" stroke="#D4924A" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="name">The Warded House</div>
    <div class="tagline">Household Management</div>
    <div class="loader">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <div class="status" id="status">Opening…</div>
    <div class="error-box" id="errorBox">
      <p id="errorMsg">Could not load app URL. Please contact Ari or Roniq.</p>
      <a id="fallbackLink" href="#" style="display:none">Open Last Known URL</a>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <script>
    // ── FIREBASE CONFIG ──────────────────────────────────────────
    const FIREBASE_CONFIG = {
      apiKey: "AIzaSyD2a23kiHIiLDNW-RYcax4a6naIszui9Us",
      authDomain: "wardedhouse-adc58.firebaseapp.com",
      projectId: "wardedhouse-adc58",
      storageBucket: "wardedhouse-adc58.firebasestorage.app",
      messagingSenderId: "763064677024",
      appId: "1:763064677024:web:c532c96d7621dd4bc94fc5"
    };
    // ── FALLBACK URL (update this when the Claude artifact URL changes) ─
    const FALLBACK_URL = "PASTE_YOUR_CURRENT_CLAUDE_ARTIFACT_URL";
    // ─────────────────────────────────────────────────────────────

    const status = document.getElementById('status');
    const errorBox = document.getElementById('errorBox');
    const errorMsg = document.getElementById('errorMsg');
    const fallbackLink = document.getElementById('fallbackLink');

    function goTo(url) {
      status.textContent = 'Loading app…';
      setTimeout(() => { window.location.replace(url); }, 300);
    }

    function showError(msg, fallback) {
      document.querySelector('.loader').style.opacity = '0.3';
      status.textContent = '';
      errorBox.style.display = 'block';
      errorMsg.textContent = msg;
      if (fallback) {
        fallbackLink.href = fallback;
        fallbackLink.style.display = 'inline-block';
      }
    }

    async function launch() {
      try {
        firebase.initializeApp(FIREBASE_CONFIG);
        const db = firebase.firestore();
        const doc = await db.collection('config').doc('launcher').get();
        if (doc.exists && doc.data().appUrl) {
          goTo(doc.data().appUrl);
        } else if (FALLBACK_URL && !FALLBACK_URL.startsWith('PASTE')) {
          goTo(FALLBACK_URL);
        } else {
          showError('App URL not set yet. Contact Ari or Roniq to configure the launcher.');
        }
      } catch (e) {
        if (FALLBACK_URL && !FALLBACK_URL.startsWith('PASTE')) {
          goTo(FALLBACK_URL);
        } else {
          showError('Could not connect. Check your internet and try again.', null);
        }
      }
    }

    // Give splash screen 800ms to breathe, then launch
    setTimeout(launch, 800);
  </script>
</body>
</html>
